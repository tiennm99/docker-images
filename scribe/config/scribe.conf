# scribe.conf – default Scribe server configuration
#
# Scribe uses a simple key=value / <store> block format.
# Full reference: https://github.com/facebookarchive/scribe/wiki/Scribe-Configuration

# ── Network ──────────────────────────────────────────────────
# TCP port scribed listens on (Thrift binary protocol)
port=1463

# Maximum messages accepted per second across all categories (0 = unlimited)
max_msg_per_second=100000

# Maximum message size in bytes (default 16 MB)
max_msg_size=16777216

# ── Health check interval ────────────────────────────────────
# How often (seconds) scribed checks whether stores are active
check_interval=3

# ── Default catch-all store ──────────────────────────────────
# Any category not matched by a specific <store> block falls here.
# Messages are written to rotating hourly files under /var/log/scribe/<category>/.
<store>
category=default
type=file
file_path=/var/log/scribe
base_filename=scribe
max_size=104857600
rotate_period=hourly
write_meta=true
</store>

# ── Example: category-specific store ─────────────────────────
# Uncomment and adapt to route a named category to its own directory.
#
# <store>
# category=myapp
# type=file
# file_path=/var/log/scribe/myapp
# base_filename=myapp
# max_size=104857600
# rotate_period=daily
# </store>

# ── Example: network store (relay to upstream Scribe) ─────────
# Forward all messages to an upstream Scribe instance.
#
# <store>
# category=default
# type=network
# remote_host=upstream-scribe.example.com
# remote_port=1463
# </store>
